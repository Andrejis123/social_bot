  # is found (see memory/future_possibilities.md).
  - platform: instagram
    handle: "pulzeczech"
    is_owned: false
    is_active: false

  # Dormant / unreliable — pulled from cron until activity resumes.
  - platform: instagram
    handle: "pulzecz"
    is_owned: false
    is_active: false

  # Restricted profile — same blocker as pulzeczech.
  - platform: instagram
    handle: "ploom.cz"
    is_owned: false
    is_active: false

  - platform: instagram
    handle: "iqos_cz"
    is_owned: false
